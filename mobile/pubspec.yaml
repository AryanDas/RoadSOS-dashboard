name: roadsos
description: "A highly resilient, AI-powered emergency response tool for the National Road Safety Hackathon 2026."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.0
  path_provider: ^2.1.3
  sqflite: ^2.3.3
  http: ^1.2.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/

